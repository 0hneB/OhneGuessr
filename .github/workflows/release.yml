name: Release
run-name: Release ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vMAJOR.MINOR.PATCH tag to release
        required: true
        type: string
      description:
        description: Release description
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate tag
        id: version
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

  linux:
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      APPIMAGE_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-linux-x64.AppImage
      DEB_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-linux-x64.deb
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential desktop-file-utils imagemagick libfuse2 libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
      - name: Install pinned Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build Linux app
        run: |
          wails build -clean -trimpath -skipbindings -tags webkit2_41 \
            -ldflags "-X main.version=$RELEASE_VERSION" -o OhneGuessr
      - name: Stage Linux packages
        run: |
          mkdir -p release package/DEBIAN AppDir
          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=OhneGuessr' \
            'Comment=A free, lean, local GeoGuessr alternative.' \
            'Exec=ohneguessr' \
            'Icon=ohneguessr' \
            'Terminal=false' \
            'Categories=Game;' \
            'StartupWMClass=OhneGuessr' > ohneguessr.desktop
          desktop-file-validate ohneguessr.desktop
          convert build/appicon.png -resize 512x512 ohneguessr.png

          install -Dm755 build/bin/OhneGuessr package/usr/bin/ohneguessr
          install -Dm644 ohneguessr.desktop package/usr/share/applications/ohneguessr.desktop
          install -Dm644 ohneguessr.png package/usr/share/icons/hicolor/512x512/apps/ohneguessr.png
          printf '%s\n' \
            'Package: ohneguessr' \
            "Version: $RELEASE_VERSION" \
            'Section: games' \
            'Priority: optional' \
            'Architecture: amd64' \
            'Maintainer: OhneB' \
            'Depends: libwebkit2gtk-4.1-0' \
            'Description: A free, lean, local GeoGuessr alternative.' > package/DEBIAN/control
          dpkg-deb --root-owner-group --build package "release/$DEB_NAME"

          install -Dm755 build/bin/OhneGuessr AppDir/usr/bin/ohneguessr
          install -Dm644 ohneguessr.desktop AppDir/usr/share/applications/ohneguessr.desktop
          install -Dm644 ohneguessr.png AppDir/usr/share/icons/hicolor/512x512/apps/ohneguessr.png
      - name: Build AppImage
        env:
          LINUXDEPLOY_SHA256: c86d6540f1df31061f02f539a2d3445f8d7f85cc3994eee1e74cd1ac97b76df0
        run: |
          curl --fail --location --output linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage
          echo "$LINUXDEPLOY_SHA256  linuxdeploy" | sha256sum --check
          chmod +x linuxdeploy
          ARCH=x86_64 OUTPUT="$GITHUB_WORKSPACE/release/$APPIMAGE_NAME" ./linuxdeploy \
            --appdir AppDir \
            --executable AppDir/usr/bin/ohneguessr \
            --desktop-file AppDir/usr/share/applications/ohneguessr.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/ohneguessr.png \
            --exclude-library 'libgdk-3.so*' \
            --exclude-library 'libgdk_pixbuf-2.0.so*' \
            --exclude-library 'libgio-2.0.so*' \
            --exclude-library 'libglib-2.0.so*' \
            --exclude-library 'libgmodule-2.0.so*' \
            --exclude-library 'libgobject-2.0.so*' \
            --exclude-library 'libgtk-3.so*' \
            --exclude-library 'libjavascriptcoregtk-4.1.so*' \
            --exclude-library 'libsoup-3.0.so*' \
            --exclude-library 'libwebkit2gtk-4.1.so*' \
            --output appimage
      - name: Verify Linux packages
        run: |
          test -s "release/$APPIMAGE_NAME"
          test -s "release/$DEB_NAME"
          dpkg-deb --info "release/$DEB_NAME"
          dpkg-deb --contents "release/$DEB_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*
          if-no-files-found: error
          retention-days: 1

  linux-smoke:
    needs: [prepare, linux]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      APPIMAGE_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-linux-x64.AppImage
      DEB_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-linux-x64.deb
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: release
      - name: Install and inspect DEB
        run: |
          sudo apt-get update
          sudo apt-get install --yes dbus-x11 xvfb "./release/$DEB_NAME"
          test "$(dpkg-query --show --showformat='${Status}' ohneguessr)" = "install ok installed"
          test -x /usr/bin/ohneguessr
          test -f /usr/share/applications/ohneguessr.desktop
      - name: Launch AppImage
        run: |
          chmod +x "release/$APPIMAGE_NAME"
          set +e
          timeout 15s dbus-run-session -- xvfb-run -a \
            env APPIMAGE_EXTRACT_AND_RUN=1 "release/$APPIMAGE_NAME" > appimage.log 2>&1
          status=$?
          set -e
          cat appimage.log
          if [ "$status" -ne 124 ]; then
            echo "AppImage exited before the smoke-test timeout (status $status)" >&2
            exit 1
          fi

  windows:
    needs: prepare
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      PORTABLE_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-windows-x64.exe
      SETUP_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-windows-x64-setup.exe
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Set Windows product version
        shell: pwsh
        run: |
          $config = Get-Content wails.json -Raw | ConvertFrom-Json
          $config.info.productVersion = $env:RELEASE_VERSION
          $config | ConvertTo-Json -Depth 10 | Set-Content wails.json -Encoding utf8
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: go vet ./internal/app
      - run: go test ./...
      - name: Install pinned Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          'C:\Program Files (x86)\NSIS' | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Build Windows packages
        shell: pwsh
        run: |
          wails build -clean -trimpath -skipbindings -webview2 embed -nsis `
            -ldflags "-X main.version=$env:RELEASE_VERSION" -o OhneGuessr.exe
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item build/bin/OhneGuessr.exe "release/$env:PORTABLE_NAME"
          $installer = Get-ChildItem build/bin/*-installer.exe | Select-Object -First 1
          if (-not $installer) { throw "Wails did not create an installer" }
          Copy-Item $installer.FullName "release/$env:SETUP_NAME"
          Get-Item "release/$env:PORTABLE_NAME", "release/$env:SETUP_NAME"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*
          if-no-files-found: error
          retention-days: 1

  macos:
    needs: prepare
    runs-on: macos-15
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      DMG_NAME: OhneGuessr-${{ needs.prepare.outputs.version }}-macos.dmg
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - name: Install pinned Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build universal macOS app
        run: |
          wails build -clean -trimpath -skipbindings -platform darwin/universal \
            -ldflags "-X main.version=$RELEASE_VERSION" -o OhneGuessr
          app=build/bin/OhneGuessr.app
          binary="$app/Contents/MacOS/OhneGuessr"
          test -x "$binary"
          lipo "$binary" -verify_arch x86_64 arm64
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
      - name: Build and verify DMG
        run: |
          mkdir -p release dmg
          cp -R build/bin/OhneGuessr.app dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname OhneGuessr -srcfolder dmg -format UDZO -ov "release/$DMG_NAME"

          mount_point="$RUNNER_TEMP/ohneguessr-dmg"
          mkdir -p "$mount_point"
          hdiutil attach "release/$DMG_NAME" -mountpoint "$mount_point" -nobrowse -readonly
          trap 'hdiutil detach "$mount_point" || true' EXIT
          test -d "$mount_point/OhneGuessr.app"
          lipo "$mount_point/OhneGuessr.app/Contents/MacOS/OhneGuessr" -verify_arch x86_64 arm64
          hdiutil detach "$mount_point"
          trap - EXIT
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*
          if-no-files-found: error
          retention-days: 1

  upload:
    needs: [prepare, linux-smoke, windows, macos]
    runs-on: ubuntu-22.04
    env:
      GH_REPO: ${{ github.repository }}
      RELEASE_DESCRIPTION: ${{ inputs.description }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: release
          merge-multiple: true
      - name: Validate release files
        run: |
          expected=(
            "OhneGuessr-$RELEASE_VERSION-linux-x64.AppImage"
            "OhneGuessr-$RELEASE_VERSION-linux-x64.deb"
            "OhneGuessr-$RELEASE_VERSION-macos.dmg"
            "OhneGuessr-$RELEASE_VERSION-windows-x64-setup.exe"
            "OhneGuessr-$RELEASE_VERSION-windows-x64.exe"
          )
          mapfile -t actual < <(find release -maxdepth 1 -type f -printf '%f\n' | sort)
          if ! diff -u <(printf '%s\n' "${expected[@]}" | sort) <(printf '%s\n' "${actual[@]}"); then
            echo "Release files do not match the expected set" >&2
            exit 1
          fi
      - name: Upload to draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh release view "$RELEASE_TAG" --json name --jq .name)" = "OhneGuessr $RELEASE_TAG"
          test "$(gh release view "$RELEASE_TAG" --json body --jq .body)" = "$RELEASE_DESCRIPTION"
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "true"
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "true"
          gh release upload "$RELEASE_TAG" \
            "release/OhneGuessr-$RELEASE_VERSION-linux-x64.AppImage" \
            "release/OhneGuessr-$RELEASE_VERSION-linux-x64.deb" \
            "release/OhneGuessr-$RELEASE_VERSION-macos.dmg" \
            "release/OhneGuessr-$RELEASE_VERSION-windows-x64-setup.exe" \
            "release/OhneGuessr-$RELEASE_VERSION-windows-x64.exe"
      - name: Verify draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh release view "$RELEASE_TAG" --json tagName --jq .tagName)" = "$RELEASE_TAG"
          test "$(gh release view "$RELEASE_TAG" --json name --jq .name)" = "OhneGuessr $RELEASE_TAG"
          test "$(gh release view "$RELEASE_TAG" --json body --jq .body)" = "$RELEASE_DESCRIPTION"
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "true"
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "true"
          test "$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length')" = "5"
