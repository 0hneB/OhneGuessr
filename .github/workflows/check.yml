name: Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Verify tracked frontend build
        run: git diff --exit-code -- frontend/dist
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - name: Check Go formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - run: go vet ./internal/app
      - run: go test -race ./internal/app

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Verify tracked frontend build
        run: git diff --exit-code -- frontend/dist
      - run: go test ./...
      - name: Install pinned Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          'C:\Program Files (x86)\NSIS' | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Build portable app and installer
        shell: pwsh
        run: |
          wails build -clean -trimpath -skipbindings -webview2 embed -nsis -o OhneGuessr.exe
          if (-not (Get-ChildItem build/bin/*-installer.exe)) {
            throw "Wails did not create an installer"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: OhneGuessr-windows-x64
          path: |
            build/bin/OhneGuessr.exe
            build/bin/*-installer.exe
          if-no-files-found: error
          retention-days: 7
