name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify tracked build
        run: git diff --exit-code -- dist
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m compileall -q server
      - name: Smoke-test production server
        shell: bash
        run: |
          python server/serve.py --no-browser &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8000/api/health && break
            sleep 0.25
          done
          curl --fail --silent http://127.0.0.1:8000/api/health
          curl --fail --silent http://127.0.0.1:8000/ | grep --quiet '<div id="app"></div>'
