<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FreeGuessr</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="pano"></div>

  <button id="settingsBtn" aria-label="Settings" title="Settings">&#9881;</button>

  <div id="settings" class="hidden">
    <div class="settings-card">
      <div class="settings-head">
        <h2>Settings</h2>
        <button id="settingsClose" aria-label="Close">&times;</button>
      </div>
      <label class="setting">
        <span>Map style</span>
        <select id="mapStyleSel"></select>
      </label>
      <label class="setting">
        <span>Panorama quality</span>
        <select id="qualitySel">
          <option value="low">Low &mdash; fastest</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="max">Max &mdash; sharpest</option>
        </select>
      </label>
      <div class="setting">
        <span>Custom locations</span>
        <div id="dropZone">
          <b>Drop a .json here</b>
          <small>or click to choose &middot; GeoGuessr export or FreeGuessr format</small>
        </div>
        <input id="fileInput" type="file" accept=".json,application/json" hidden />
        <div class="upload-row">
          <span id="uploadInfo" class="settings-note"></span>
          <button id="resetLocations" class="link-btn hidden">Reset to built-in</button>
        </div>
      </div>
    </div>
  </div>

  <div id="topLeft" class="hud-pill">
    <span>Round <b id="round">1</b>/<b id="rounds">5</b></span>
  </div>

  <div id="compass" title="Heading (N to face north, R to reset view)">
    <div id="compassStrip"></div>
    <div id="compassMark"></div>
  </div>

  <div id="scoreBox" class="hud-pill">Score <b id="total">0</b></div>

  <div id="guessPanel">
    <div id="map"></div>
    <button id="guessBtn" disabled>Guess</button>
  </div>

  <div id="resultScreen" class="hidden">
    <div id="resultMap"></div>
    <div id="resultPanel">
      <div class="result-dist"><b id="resultDist">—</b> away</div>
      <div class="result-points"><b id="resultPoints">0</b> points</div>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <div id="final" class="hidden">
    <div class="final-card">
      <h1>Game over</h1>
      <p class="final-score" id="finalScore">0 / 25000</p>
      <button id="playAgain">Play again</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingText">Loading…</p>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
