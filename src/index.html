<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>OhneGuessr</title>

  <link rel="icon" href="images/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="images/ohneguessr-logo.svg" />

  <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css" />
  <link rel="stylesheet" href="css/style.css" />

  <script src="vendor/maplibre/maplibre-gl.js"></script>
</head>
<body>
  <div id="pano"></div>

  <button id="settingsBtn" aria-label="Settings" title="Settings">
    <span class="svg-icon settings-icon" aria-hidden="true"></span>
  </button>

  <div id="settings" class="hidden">
    <div class="settings-card">
      <div class="settings-head">
        <h2>Settings</h2>
        <div class="settings-head-controls">
          <div class="map-library-actions hidden">
            <div class="map-search">
              <input id="mapSearchInput" class="map-search-input" type="search"
                     aria-label="Search maps" placeholder="Search maps"
                     autocomplete="off" spellcheck="false" hidden />
              <button id="mapSearchBtn" type="button" class="icon-action"
                      aria-label="Search maps" title="Search maps"
                      aria-controls="mapSearchInput" aria-expanded="false">
                <span class="svg-icon search-icon" aria-hidden="true"></span>
              </button>
            </div>
            <button id="openDataFolderBtn" type="button" class="icon-action"
                    aria-label="Open data folder" title="Open data folder">
              <span class="svg-icon folder-icon" aria-hidden="true"></span>
            </button>
            <button id="refreshMapsBtn" type="button" class="icon-action"
                    aria-label="Refresh maps" title="Refresh maps">
              <span class="svg-icon refresh-icon" aria-hidden="true"></span>
            </button>
          </div>
          <button id="settingsClose" aria-label="Close">
            <span class="svg-icon close-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <div class="settings-tabs" role="tablist" aria-label="Settings sections">
        <button type="button" class="settings-tab active" role="tab"
                id="tab-display" aria-controls="panel-display" aria-selected="true"
                data-tab="display">Display</button>
        <button type="button" class="settings-tab" role="tab"
                id="tab-game" aria-controls="panel-game" aria-selected="false"
                data-tab="game">Game</button>
        <button type="button" class="settings-tab" role="tab"
                id="tab-controls" aria-controls="panel-controls" aria-selected="false"
                data-tab="controls">Controls</button>
        <button type="button" class="settings-tab" role="tab"
                id="tab-maps" aria-controls="panel-maps" aria-selected="false"
                data-tab="maps">Maps</button>
      </div>

      <div class="settings-body">
        <section class="settings-panel active" id="panel-display"
                 role="tabpanel" aria-labelledby="tab-display" data-panel="display">
          <label class="setting">
            <span>Map style</span>
            <select id="mapStyleSel"></select>
          </label>
          <div class="setting">
            <span>Expanded map size</span>
            <div class="segmented" id="guessMapSizeSeg">
              <button type="button" data-value="default">Default</button>
              <button type="button" data-value="large">Large</button>
              <button type="button" data-value="xl">XL</button>
              <button type="button" data-value="xxl">XXL</button>
            </div>
          </div>
          <div class="setting">
            <span>Compass</span>
            <div class="segmented" id="compassStyleSeg">
              <button type="button" data-value="bar">Bar</button>
              <button type="button" data-value="classic">Classic</button>
              <button type="button" data-value="both">Both</button>
            </div>
          </div>
          <div class="setting setting-color">
            <span>Accent color</span>
            <div class="accent-color-actions">
              <input id="accentColor" type="color" value="#22c55e" aria-label="Accent color" />
              <button id="accentReset" type="button" class="settings-action accent-reset">Reset</button>
            </div>
          </div>
          <label class="setting setting-toggle" title="Use the widest view at the start of each round">
            <span>Street View starts zoomed out</span>
            <input id="streetViewZoomedOutToggle" type="checkbox" />
            <span class="switch" aria-hidden="true"></span>
          </label>
          <label class="setting setting-toggle">
            <span>Fullscreen</span>
            <input id="appFullscreenToggle" type="checkbox" />
            <span class="switch" aria-hidden="true"></span>
          </label>
        </section>

        <section class="settings-panel" id="panel-game"
                 role="tabpanel" aria-labelledby="tab-game" data-panel="game" hidden>
          <div class="setting">
            <span>Rounds per game</span>
            <div class="segmented" id="roundsSeg">
              <button type="button" data-value="unlimited" aria-label="Unlimited" title="Unlimited">
                <span class="svg-icon unlimited-icon" aria-hidden="true"></span>
              </button>
              <button type="button" data-value="5">5</button>
              <button type="button" data-value="10">10</button>
              <button type="button" data-value="custom">Custom</button>
            </div>
            <input id="roundsCustom" class="seg-custom hidden" type="number"
                   min="1" step="1" placeholder="Number of rounds" />
          </div>
          <div class="setting">
            <span>Time limit <small class="setting-sub">per location</small></span>
            <div class="segmented" id="timerSeg">
              <button type="button" data-value="unlimited" aria-label="Unlimited" title="Unlimited">
                <span class="svg-icon unlimited-icon" aria-hidden="true"></span>
              </button>
              <button type="button" data-value="120">2 min</button>
              <button type="button" data-value="300">5 min</button>
              <button type="button" data-value="custom">Custom</button>
            </div>
            <input id="timerCustom" class="seg-custom hidden" type="number"
                   min="0.5" step="0.5" placeholder="Minutes per location" />
          </div>
          <div class="setting">
            <span>Scoring</span>
            <div class="segmented" id="scoringSeg">
              <button type="button" data-value="world">World</button>
              <button type="button" data-value="country">Country</button>
            </div>
          </div>
          <div class="setting">
            <span>Movement</span>
            <div class="segmented" id="moveSeg">
              <button type="button" data-value="moving" title="Move, pan, and zoom">Moving</button>
              <button type="button" data-value="nm" title="No moving; pan and zoom allowed">NM</button>
              <button type="button" data-value="nmpz" title="No move, pan, or zoom">NMPZ</button>
            </div>
          </div>
          <div class="setting setting-range">
            <div class="setting-range-head">
              <label for="mapZoomSpeed">Map zoom speed</label>
              <output id="mapZoomSpeedValue" for="mapZoomSpeed">1&times;</output>
            </div>
            <input id="mapZoomSpeed" type="range" min="0.5" max="3" step="0.1" value="1" />
          </div>
        </section>

        <section class="settings-panel" id="panel-controls"
                 role="tabpanel" aria-labelledby="tab-controls" data-panel="controls" hidden>
          <div class="setting">
            <div id="keyList" class="key-list"></div>
          </div>
          <button id="keyReset" type="button" class="icon-action controls-reset"
                  aria-label="Reset controls to defaults" title="Reset controls to defaults">
            <span class="svg-icon reset-icon" aria-hidden="true"></span>
          </button>
          <a class="settings-info-link controls-info-link" href="https://github.com/0hneB/OhneGuessr#controls"
             target="_blank" rel="noopener noreferrer" aria-label="Open the usage guide on GitHub">
            <span class="svg-icon info-icon" aria-hidden="true"></span>
          </a>
        </section>

        <section class="settings-panel" id="panel-maps"
                 role="tabpanel" aria-labelledby="tab-maps" data-panel="maps" hidden>
          <div id="mapList" class="map-list"></div>
          <div class="maps-bottom">
            <div class="setting map-import">
              <div id="dropZone" class="drop-zone">
                <b>Add a map</b>
                <small>Drop a Map Making App .json here or click</small>
              </div>
              <input id="fileInput" type="file" accept=".json,application/json" hidden />
              <div id="uploadInfo" class="settings-note"></div>
            </div>
            <div class="mma-sync-section">
              <label class="setting-toggle mma-sync-toggle">
                <span>Map Making App Sync</span>
                <input id="mmaSyncToggle" type="checkbox" />
                <span class="switch" aria-hidden="true"></span>
              </label>
              <div id="mmaSyncDetails" class="mma-sync-details hidden">
                <div class="mma-sync-account-row hidden">
                  <div id="mmaSyncAccount" class="mma-sync-account"></div>
                  <div class="mma-sync-actions">
                    <button id="mmaSyncNow" type="button" class="icon-action hidden"
                            aria-label="Sync now" title="Sync now">
                      <span class="svg-icon sync-icon" aria-hidden="true"></span>
                    </button>
                    <button id="mmaKeyReplace" type="button" class="icon-action hidden"
                            aria-label="Replace key" title="Replace key">
                      <span class="svg-icon pencil-icon" aria-hidden="true"></span>
                    </button>
                    <button id="mmaKeyForget" type="button" class="icon-action hidden"
                            aria-label="Forget key" title="Forget key">
                      <span class="svg-icon rm-bookmark-icon" aria-hidden="true"></span>
                    </button>
                  </div>
                </div>
                <form id="mmaKeyForm" class="mma-key-form">
                  <input id="mmaApiKey" type="password" autocomplete="off"
                         placeholder="API key" aria-label="Map Making App API key" />
                  <button id="mmaKeySave" type="submit" class="settings-action">Save key</button>
                </form>
              </div>
            </div>
            <div class="maps-footer">
              <div id="mmaSyncStatus" class="settings-note mma-sync-status"></div>
              <a class="settings-info-link maps-info-link" href="https://github.com/0hneB/OhneGuessr#map-making-app-sync"
                 target="_blank" rel="noopener noreferrer"
                 aria-label="Open the Map Making App sync guide on GitHub">
                <span class="svg-icon info-icon" aria-hidden="true"></span>
              </a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="emptyState" class="hidden">
    <div class="empty-card">
      <h1>Add a map</h1>
      <div id="emptyDropZone" class="drop-zone drop-zone-large">
        <b>Choose a .json map</b>
        <small>Map Making App .json</small>
      </div>
      <div id="emptyUploadInfo" class="settings-note"></div>
      <button id="emptySettingsBtn" type="button">
        <span class="svg-icon settings-icon" aria-hidden="true"></span>
        <span>Settings</span>
      </button>
    </div>
  </div>

  <div id="topLeft" class="hud-pill">
    <span>Round <b id="round">1</b>/<b id="rounds">5</b></span>
  </div>

  <canvas id="compass-hud" width="240" height="32"
          title="Click or press N to face north (R resets view)"></canvas>

  <button id="classicCompass" class="classic-compass" type="button"
          aria-label="Face north" title="Click or press N to face north (R resets view)">
    <svg id="classicCompassNeedle" class="classic-compass-needle"
         viewBox="0 0 48 48" aria-hidden="true">
      <path class="classic-compass-north" d="M24 1 30 24 18 24Z"></path>
      <path class="classic-compass-south" d="M24 47 18 24 30 24Z"></path>
    </svg>
  </button>

  <div id="timerBox" class="hud-pill hidden"><span class="svg-icon timer-icon" aria-hidden="true"></span><b id="timerVal">0:30</b></div>

  <div id="scoreBox" class="hud-pill">Score <b id="total">0</b></div>

  <div id="guessPanel">
    <div id="map"></div>
    <button id="guessBtn" disabled>Guess</button>
  </div>

  <div id="resultScreen" class="hidden">
    <div id="resultMap"></div>
    <div id="resultPanel">
      <div class="result-dist"><b id="resultDist">—</b> away</div>
      <div class="result-points"><b id="resultPoints">0</b> points</div>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <div id="final" class="hidden">
    <div id="finalMap"></div>
    <div class="final-card">
      <h1>Game over</h1>
      <p class="final-score" id="finalScore">0 / 25000</p>
      <div id="finalRounds" class="final-rounds"></div>
      <button id="playAgain">Play again</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingText">Loading…</p>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
